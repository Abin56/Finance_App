name: finance_app
description: "FlowFi — a premium offline-first personal finance manager."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Backend / persistence (offline-first via Firestore cache)
  firebase_core: ^3.8.1
  cloud_firestore: ^5.5.1
  firebase_auth: ^5.3.4
  google_sign_in: ^7.2.0
  firebase_storage: ^12.3.8
  firebase_crashlytics: ^4.2.0
  firebase_analytics: ^11.3.6
  shared_preferences: ^2.3.5

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI / design
  google_fonts: ^6.2.1
  lottie: ^3.3.1
  fl_chart: ^0.70.2
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  equatable: ^2.0.7
  flutter_animate: ^4.5.2

  # Security (app lock PIN hashing + secure keystore/keychain storage —
  # Firestore's own offline cache is not field-level encrypted, see
  # SECURITY note in core/services/security/secure_key_service.dart)
  local_auth: ^2.3.0
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.4

  cupertino_icons: ^1.0.8
  share_plus: ^12.0.2

  # Expense-sharing receipt export — `pdf` builds the shareable PDF (the
  # preview's captured receipt image embedded on a page, so no font
  # embedding is needed for ₹), `path_provider` supplies the temp dir the
  # image/PDF files are written to before handing them to share_plus.
  pdf: ^3.11.1
  path_provider: ^2.1.5

  # Bills & reminders
  table_calendar: ^3.1.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # SMS Inbox — local-only SMS scan/parse/review layer (see
  # lib/features/sms_inbox). sqflite/path back the device-local dedup+status
  # store (deliberately NOT Firestore, see SmsInboxRepository doc comment).
  # flutter_sms_inbox reads the Android SMS content provider on demand
  # (Android-only; no-op on iOS, which has no public SMS-reading API).
  # permission_handler gives a clean cross-platform permission API for the
  # SMS access request/denied/settings flow.
  sqflite: ^2.4.1
  path: ^1.9.0
  flutter_sms_inbox: ^1.0.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.3

  # Firebase test fakes (offline, no real project/credentials needed)
  fake_cloud_firestore: ^3.1.0
  firebase_auth_mocks: ^0.14.2

  # In-memory sqflite for SMS Inbox repository tests under `flutter test`
  sqflite_common_ffi: ^2.3.4

  # Launcher icon generation (dev-only tool, not a runtime dependency)
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon/app_icon_foreground.png"
  min_sdk_android: 21
